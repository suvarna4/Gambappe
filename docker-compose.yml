# Dev stores per design doc §3 / §4.1: Postgres 16 + Redis 7.
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: receipts
      POSTGRES_PASSWORD: receipts
      POSTGRES_DB: receipts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts -d receipts"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
