# TEMPORARY — generates WS22-T1's new /you visual baselines (you-ghost.png / you-claimed.png) in the
# CI browser (they were never created locally), commits them [skip ci], then is removed before merge.
name: update-baselines

on:
  push:
    branches: [feat/ws22-t1-you]

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: receipts
          POSTGRES_PASSWORD: receipts
          POSTGRES_DB: receipts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U receipts -d receipts"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://receipts:receipts@localhost:5432/receipts
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GHOST_COOKIE_SECRET: e2e-test-ghost-cookie-secret
      SHARE_TOKEN_SECRET: e2e-test-share-token-secret
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Migrate + seed
        run: |
          pnpm db:migrate
          pnpm db:seed
        env:
          ADMIN_SEED_EMAIL: ci-admin@receipts.test

      - name: Install Playwright chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Regenerate /you baselines
        run: pnpm --filter web exec playwright test e2e/you-room.spec.ts --update-snapshots

      - name: Commit regenerated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain apps/web/e2e/you-room.spec.ts-snapshots)" ]; then
            git add apps/web/e2e/you-room.spec.ts-snapshots
            git commit -m "chore(ws22-t1): add /you visual baselines [skip ci]"
            git push origin HEAD:feat/ws22-t1-you
          else
            echo "No baseline change produced."
          fi
