# TEMPORARY helper (WS16-T3): regenerate the /dev/ui visual-regression baselines from CI's own
# Chromium (the only environment that mirrors the e2e gate's browser exactly — see
# apps/web/playwright.config.ts's toHaveScreenshot note) and push them back to the branch.
# Removed before merge; this file exists only on the feature branch.
name: update-baselines

on:
  push:
    branches:
      - feat/ws16-t3-ticketframe

permissions:
  contents: write

jobs:
  update:
    name: regenerate visual baselines
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: receipts
          POSTGRES_PASSWORD: receipts
          POSTGRES_DB: receipts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U receipts -d receipts"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CI: 'true'
      DATABASE_URL: postgres://receipts:receipts@localhost:5432/receipts
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GHOST_COOKIE_SECRET: e2e-test-ghost-cookie-secret
      SHARE_TOKEN_SECRET: e2e-test-share-token-secret
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Migrate + seed
        run: |
          pnpm db:migrate
          pnpm db:seed
        env:
          ADMIN_SEED_EMAIL: ci-admin@receipts.test

      - name: Install Playwright chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: pnpm --filter web exec playwright test e2e/dev-ui-visual.spec.ts --update-snapshots

      - name: Commit + push regenerated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain 'apps/web/e2e')" ]]; then
            git add apps/web/e2e
            git commit -m "chore(ws16-t3): regenerate visual baselines from CI [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed regenerated baselines."
          else
            echo "No baseline changes to commit."
          fi
