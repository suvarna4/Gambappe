# Parallel deploy to YOUR OWN stack (your Vercel project + Fly app + Neon + Upstash), running
# alongside the collaborator's `auto-deploy-staging.yml` without touching it. Same three legs
# (migrate Neon → refresh Fly worker → deploy Vercel web), same deploy-on-merge + poll + manual
# triggers, but driven entirely by a separate `MY_*` set of secrets/vars — so this whole workflow
# is INERT until you configure them.
#
# ACTIVATION (Repo → Settings → Secrets and variables → Actions):
#   Secrets:  MY_STAGING_DATABASE_URL (Neon DIRECT url) · MY_FLY_API_TOKEN · MY_VERCEL_TOKEN
#   Variables: MY_VERCEL_ORG_ID · MY_VERCEL_PROJECT_ID · MY_FLY_APP · MY_HEALTH_URL
# Each leg no-ops with a notice if its secret/var is missing, so you can light them up one at a time.
name: auto-deploy (own stack)

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: auto-deploy-own-stack
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Non-secret project ids/urls, supplied as repo VARIABLES (empty until you set them).
  VERCEL_ORG_ID: ${{ vars.MY_VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.MY_VERCEL_PROJECT_ID }}
  FLY_APP: ${{ vars.MY_FLY_APP }}
  HEALTH_URL: ${{ vars.MY_HEALTH_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Separate marker namespace from the collaborator pipeline so the two never collide.
      - name: Restore last-deployed marker
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .last-deployed-own-sha
          key: auto-deploy-own-sha-${{ github.sha }}
          restore-keys: auto-deploy-own-sha-

      - name: Decide whether to deploy
        id: decide
        run: |
          last="$(cat .last-deployed-own-sha 2>/dev/null || echo none)"
          echo "last deployed: $last | head: $GITHUB_SHA"
          if [ "$last" = "$GITHUB_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "HEAD already deployed to own stack — nothing to do." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Migrations (Neon)
        if: steps.decide.outputs.changed == 'true'
        env:
          STAGING_DATABASE_URL: ${{ secrets.MY_STAGING_DATABASE_URL }}
        run: |
          if [ -z "$STAGING_DATABASE_URL" ]; then
            echo "MY_STAGING_DATABASE_URL secret not set — skipping migrations." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          corepack enable
          pnpm install --frozen-lockfile --filter @receipts/db...
          DATABASE_URL="$STAGING_DATABASE_URL" pnpm --filter @receipts/db db:migrate
          echo "Migrations applied (own stack)." >> "$GITHUB_STEP_SUMMARY"

      - name: Worker (Fly)
        if: steps.decide.outputs.changed == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.MY_FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ] || [ -z "$FLY_APP" ]; then
            echo "MY_FLY_API_TOKEN or MY_FLY_APP not set — skipping worker deploy." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          IMAGE="registry.fly.io/$FLY_APP:auto-${GITHUB_SHA::12}"
          docker build -f apps/worker/Dockerfile -t "$IMAGE" .
          echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin
          docker push "$IMAGE"

          AUTH="Authorization: Bearer $FLY_API_TOKEN"
          MACHINE_ID="$(curl -sSf -H "$AUTH" "https://api.machines.dev/v1/apps/$FLY_APP/machines" | jq -r '.[0].id')"
          [ -n "$MACHINE_ID" ] && [ "$MACHINE_ID" != null ] || { echo "no machine found for $FLY_APP" >&2; exit 1; }
          # Machine update re-snapshots app secrets, so flag/env changes ride along too.
          curl -sSf -X POST -H "$AUTH" -H 'Content-Type: application/json' \
            "https://api.machines.dev/v1/apps/$FLY_APP/machines/$MACHINE_ID" \
            -d "{\"config\":{\"image\":\"$IMAGE\",\"guest\":{\"cpu_kind\":\"shared\",\"cpus\":1,\"memory_mb\":512},\"restart\":{\"policy\":\"always\"}}}" > /dev/null
          for i in $(seq 1 24); do
            STATE="$(curl -sS -H "$AUTH" "https://api.machines.dev/v1/apps/$FLY_APP/machines/$MACHINE_ID" | jq -r .state)"
            [ "$STATE" = started ] && break
            [ "$STATE" = stopped ] && curl -sS -X POST -H "$AUTH" "https://api.machines.dev/v1/apps/$FLY_APP/machines/$MACHINE_ID/start" > /dev/null
            sleep 5
          done
          echo "Worker on $IMAGE (machine $MACHINE_ID: $STATE)." >> "$GITHUB_STEP_SUMMARY"

      - name: Web (Vercel production)
        if: steps.decide.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.MY_VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "MY_VERCEL_TOKEN / MY_VERCEL_ORG_ID / MY_VERCEL_PROJECT_ID not all set — skipping web deploy." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
          if [ -n "$HEALTH_URL" ]; then curl -sSf --max-time 30 "$HEALTH_URL"; fi
          echo "Web deployed (own stack); health OK." >> "$GITHUB_STEP_SUMMARY"

      - name: Save last-deployed marker
        if: steps.decide.outputs.changed == 'true'
        run: echo "$GITHUB_SHA" > .last-deployed-own-sha

      - uses: actions/cache/save@v4
        if: steps.decide.outputs.changed == 'true'
        with:
          path: .last-deployed-own-sha
          key: auto-deploy-own-sha-${{ github.sha }}
